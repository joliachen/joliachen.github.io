name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to joliachen.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: joliachen/joliachen.github.io
          publish_branch: main
          publish_dir: ./
          exclude_assets: '.github'
          force_orphan: true
          commit_message: 'deploy'
